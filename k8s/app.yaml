apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantity-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quantity-app
  template:
    metadata:
      labels:
        app: quantity-app
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox
        command: ['sh', '-c', 'until nc -z mysql-svc 3306; do sleep 3; done']
      containers:
      - name: app
        image: 190249219979.dkr.ecr.ap-south-1.amazonaws.com/quantity-measurement:latest
        imagePullPolicy: Always
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://mysql-svc:3306/quantitydb
        - name: SPRING_DATASOURCE_USERNAME
          value: quantity
        - name: SPRING_DATASOURCE_PASSWORD
          value: Abc@12345
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: quantity-app-svc
spec:
  selector:
    app: quantity-app
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
